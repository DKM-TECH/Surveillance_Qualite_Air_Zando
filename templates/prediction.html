<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>
        Temps réel + IA - Qualité de l'air
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            overflow-x:hidden;
            padding-bottom:40px;
        }

        .navbar{
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 40px;
            background:#111827;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:22px;
            font-weight:700;
            color:#38bdf8;
        }

        .nav-links{
            display:flex;
            gap:18px;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            font-weight:500;
            transition:0.3s;
            padding:8px 14px;
            border-radius:8px;
        }

        .nav-links a:hover{
            background:#38bdf8;
            color:#0f172a;
        }

        .title-box{
            text-align:center;
            margin-top:40px;
            margin-bottom:30px;
        }

        .title-box h1{
            color:#38bdf8;
            font-size:42px;
            margin-bottom:15px;
        }

        .title-box p{
            color:#cbd5e1;
            font-size:18px;
        }

        .box{
            width:95%;
            max-width:1200px;
            margin:auto;
            background:#1e293b;
            padding:25px;
            border-radius:20px;
        }

        canvas{
            background:#0b1220;
            border-radius:12px;
            padding:10px;
        }

        .alert{
            margin-top:25px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .prediction-grid{
            margin-top:30px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .prediction-card{
            background:#111827;
            border-radius:16px;
            padding:20px;
            text-align:center;
        }

        .prediction-card h3{
            color:#38bdf8;
            margin-bottom:12px;
            font-size:20px;
        }

        .prediction-value{
            font-size:32px;
            font-weight:bold;
            color:white;
        }

        footer{
            margin-top:50px;
            text-align:center;
            padding:25px;
            background:#111827;
            color:#94a3b8;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <div class="logo">
        <i class="fas fa-microchip"></i>
        IoT Smart Monitoring
    </div>

    <div class="nav-links">

        <a href="/">Accueil</a>
        <a href="/gauges">Live</a>
        <a href="/prediction">IA</a>
        <a href="/apriori">Apriori</a>
        <a href="/rapport">Rapport</a>

    </div>

</nav>

<div class="title-box">

    <h1>
         Monitoring et Prédiction 
    </h1>

    <p>
        Visualisation temps réel et prédictions intelligentes
    </p>

</div>

<div class="box">

    <canvas id="chart"></canvas>

    <div id="alertBox" class="alert"></div>

    <div class="prediction-grid">

        <div class="prediction-card">
            <h3>PM2.5 IA</h3>
            <div id="pred_pm25" class="prediction-value">0</div>
        </div>

        <div class="prediction-card">
            <h3>PM10 IA</h3>
            <div id="pred_pm10" class="prediction-value">0</div>
        </div>

        <div class="prediction-card">
            <h3>CO2 IA</h3>
            <div id="pred_co2" class="prediction-value">0</div>
        </div>

        <div class="prediction-card">
            <h3>NOx IA</h3>
            <div id="pred_nox" class="prediction-value">0</div>
        </div>

        <div class="prediction-card">
            <h3>SOx IA</h3>
            <div id="pred_sox" class="prediction-value">0</div>
        </div>

        <div class="prediction-card">
            <h3>NHx IA</h3>
            <div id="pred_nhx" class="prediction-value">0</div>
        </div>

    </div>

</div>

<script>

const ctx =
    document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {

    type: "line",

    data: {

        labels: [],

        datasets: [

            {
                label: "PM2.5",
                borderColor: "#38bdf8",
                data: [],
                tension:0.4
            },

            {
                label: "PM10",
                borderColor: "#f97316",
                data: [],
                tension:0.4
            },

            {
                label: "CO2",
                borderColor: "#22c55e",
                data: [],
                tension:0.4
            },

            {
                label: "NOx",
                borderColor: "#ef4444",
                data: [],
                tension:0.4
            },

            {
                label: "SOx",
                borderColor: "#a855f7",
                data: [],
                tension:0.4
            },

            {
                label: "NHx",
                borderColor: "#eab308",
                data: [],
                tension:0.4
            },

            {
                label: "PM2.5 IA",
                borderColor: "#ffffff",
                borderDash:[5,5],
                data: [],
                tension:0.4
            }

        ]
    },

    options: {

        responsive:true,

        animation:false,

        plugins: {

            legend:{
                labels:{
                    color:"white"
                }
            }
        },

        scales: {

            x:{
                ticks:{
                    color:"white"
                }
            },

            y:{
                ticks:{
                    color:"white"
                }
            }

        }

    }

});

function safe(v){

    if(v === undefined || v === null || isNaN(v)){
        return 0;
    }

    return Number(v);
}

async function updateChart(){

    try{

        // ================= REALTIME =================

        const realtimeResponse =
            await fetch("/api/realtime");

        const realtimeData =
            await realtimeResponse.json();

        console.log("REALTIME:", realtimeData);

        if(!realtimeData.pm25){
            console.log("NO REALTIME DATA");
            return;
        }

        chart.data.labels =
            realtimeData.labels;

        chart.data.datasets[0].data =
            realtimeData.pm25.map(safe);

        chart.data.datasets[1].data =
            realtimeData.pm10.map(safe);

        chart.data.datasets[2].data =
            realtimeData.co2.map(safe);

        chart.data.datasets[3].data =
            realtimeData.nox.map(safe);

        chart.data.datasets[4].data =
            realtimeData.sox.map(safe);

        chart.data.datasets[5].data =
            realtimeData.nhx.map(safe);

        // ================= PREDICTION =================

        try{

            const predResponse =
                await fetch("/predict");

            const prediction =
                await predResponse.json();

            console.log("PREDICTION:", prediction);

            if(!prediction.error){

                chart.data.datasets[6].data =
                    Array(
                        realtimeData.labels.length
                    ).fill(
                        safe(prediction.pm25)
                    );

                document.getElementById("pred_pm25").innerHTML =
                    safe(prediction.pm25).toFixed(2);

                document.getElementById("pred_pm10").innerHTML =
                    safe(prediction.pm10).toFixed(2);

                document.getElementById("pred_co2").innerHTML =
                    safe(prediction.co2).toFixed(2);

                document.getElementById("pred_nox").innerHTML =
                    safe(prediction.nox).toFixed(2);

                document.getElementById("pred_sox").innerHTML =
                    safe(prediction.sox).toFixed(2);

                document.getElementById("pred_nhx").innerHTML =
                    safe(prediction.nhx).toFixed(2);

                const alertBox =
                    document.getElementById("alertBox");

                if(
                    safe(prediction.pm25) > 35 ||
                    safe(prediction.pm10) > 50 ||
                    safe(prediction.co2) > 1000
                ){

                    alertBox.innerHTML =
                        "⚠️ Pollution future détectée";

                    alertBox.style.color = "red";

                }else{

                    alertBox.innerHTML =
                        "✔ Qualité future stable";

                    alertBox.style.color = "#22c55e";
                }

            }else{

                console.log("MODEL ERROR");

                document.getElementById("alertBox").innerHTML =
                    "⚠️ Modèle IA indisponible";

                document.getElementById("alertBox").style.color =
                    "orange";
            }

        }catch(predErr){

            console.log("PRED FETCH ERROR:", predErr);
        }

        chart.update();

    }catch(error){

        console.log("REALTIME ERROR:", error);
    }

}

// premier chargement
updateChart();

// refresh temps réel
setInterval(updateChart, 3000);

</script>

<footer>

    © 2026 IoT Smart Monitoring —
    Intelligence artificielle et surveillance environnementale

</footer>

</body>
</html>
