<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dataset Qualité de l'Air</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

tr:nth-child(even){
    background:#f5f5f5;
}
</style>
</head>

<body>

<nav>
    <a href="/">Accueil</a>
    <a href="/dataset">Tableau de données</a>
</nav>

<h1>Dataset Qualité de l'Air</h1>

<table>
<thead>
<tr>
    <th>Date</th>
    <th>PM2.5</th>
    <th>PM10</th>
    <th>CO2</th>
    <th>NOx</th>
    <th>SOx</th>
    <th>NHx</th>
</tr>
</thead>

<tbody id="dataset-body">
<!-- rempli dynamiquement -->
</tbody>

</table>

<script>

async function loadDataset(){

    const tbody = document.getElementById("dataset-body");

    if (!tbody) {
        console.error("tbody introuvable");
        return;
    }

    const res = await fetch("/api/dataset");
    const data = await res.json();

    console.log(data);

    tbody.innerHTML = "";

    data.rows.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.timestamp}</td>
            <td>${row.pm25}</td>
            <td>${row.pm10}</td>
            <td>${row.co2}</td>
            <td>${row.nox}</td>
            <td>${row.sox}</td>
            <td>${row.nhx}</td>
        `;

        tbody.appendChild(tr);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    loadDataset();
    setInterval(loadDataset, 5000);
});

</script>

</body>
</html>
